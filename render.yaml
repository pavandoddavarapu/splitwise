# render.yaml
# Declares the Render web service and managed Postgres database.
# Render reads this file automatically from the repo root.
#
# Build order (single service):
#   1. pip install Python deps
#   2. npm install + vite build → produces frontend/dist/
#   3. collectstatic → copies frontend/dist into backend/staticfiles/
#      (whitenoise serves from there)
#   4. migrate → applies all pending Django migrations to Render Postgres

services:
  - type: web
    name: spreetail
    runtime: python
    region: oregon
    plan: free

    buildCommand: |
      pip install -r backend/requirements.txt
      cd frontend && npm install && npm run build && cd ..
      cd backend && python manage.py collectstatic --noinput && cd ..
      cd backend && python manage.py migrate && cd ..

    startCommand: cd backend && gunicorn spreetail.wsgi:application --bind 0.0.0.0:$PORT

    healthCheckPath: /api/health/

    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: spreetail.settings
      - key: SECRET_KEY
        generateValue: true          # Render generates a random value on first deploy
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: spreetail-db
          property: connectionString

databases:
  - name: spreetail-db
    plan: free
    region: oregon
